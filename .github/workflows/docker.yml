name: Docker

on:
  workflow_run:
    workflows: [Checks]
    branches: [main]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      IMAGE: ghcr.io/gailimov/s3-mock:latest

    steps:
      - name: Get current timestamp
        id: timestamp
        run: echo "rfc3339=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          labels: |
            org.opencontainers.image.created=${{ steps.timestamp.outputs.rfc3339 }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}
